{% extends "base.html" %}
{% block contenido %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4">Crear Cuenta</h3>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="es_vendedor" class="form-check-input" id="esVendedor">
                    <label class="form-check-label" for="esVendedor">Quiero vender productos también</label>
                </div>
                <button type="submit" class="btn btn-cian w-100">Registrarme</button>
            </form>

            <p class="text-center mt-3 mb-0">
                ¿Ya tienes cuenta? <a href="/login" style="color: var(--cian);">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
