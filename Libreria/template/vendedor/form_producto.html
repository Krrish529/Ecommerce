{% extends "base.html" %}
{% block contenido %}

<h2 class="mb-4">{{ "Editar Producto" if producto else "Nuevo Producto" }}</h2>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre del producto</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ producto.nombre if producto else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion if producto else '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Marca</label>
                    <input type="text" name="marca" class="form-control"
                           value="{{ producto.marca if producto else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select name="categoria_id" class="form-select" required>
                        {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if producto and producto.categoria_id == cat.id %}selected{% endif %}>
                            {{ cat.icono }} {{ cat.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio (S/.)</label>
                    <input type="number" step="0.01" name="precio" class="form-control"
                           value="{{ producto.precio if producto else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control"
                           value="{{ producto.stock if producto else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">URL de imagen (opcional)</label>
                    <input type="text" name="imagen_url" class="form-control"
                           value="{{ producto.imagen_url if producto else '' }}">
                </div>

                <button type="submit" class="btn btn-cian w-100">
                    {{ "Guardar Cambios" if producto else "Publicar Producto" }}
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
